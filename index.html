<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyCards - Smart Language Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .tab {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            min-height: 400px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .badges-section {
            margin: 30px 0;
        }
        
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .badge {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: #f5f5f5;
            transition: all 0.3s;
        }
        
        .badge.unlocked {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            transform: scale(1.05);
        }
        
        .badge-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .badge-name {
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .deck-list {
            display: grid;
            gap: 15px;
        }
        
        .deck-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .deck-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .deck-info h3 {
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .deck-stats {
            font-size: 0.9em;
            color: #666;
        }
        
        .flashcard {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .flashcard:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .flashcard.flipped {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .card-front, .card-back {
            font-size: 2em;
            font-weight: bold;
        }
        
        .card-back {
            display: none;
        }
        
        .flashcard.flipped .card-front {
            display: none;
        }
        
        .flashcard.flipped .card-back {
            display: block;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .settings-form {
            display: grid;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: bold;
            color: #374151;
        }
        
        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .card {
                padding: 20px;
            }
            
            .flashcard {
                padding: 40px 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎴 PolyCards</h1>
            <p>Smart Language Learning with Spaced Repetition</p>
        </header>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab" onclick="switchTab('decks')">📚 Decks</button>
            <button class="tab" onclick="switchTab('study')">🎯 Study</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ Settings</button>
        </div>
        
        <div id="dashboard" class="tab-content active">
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #374151;">Your Progress</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Cards Studied</div>
                        <div class="stat-value" id="totalStudied">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Current Streak</div>
                        <div class="stat-value" id="currentStreak">0</div>
                        <div class="stat-label">Days</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Mastery Rate</div>
                        <div class="stat-value" id="masteryRate">0%</div>
                        <div class="stat-label">Average</div>
                    </div>
                </div>
                
                <div class="badges-section">
                    <h3 style="color: #374151; margin-bottom: 15px;">🏆 Achievements</h3>
                    <div class="badges-grid" id="badgesGrid"></div>
                </div>
            </div>
        </div>
        
        <div id="decks" class="tab-content">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: #374151;">Your Decks</h2>
                    <button class="btn-primary" onclick="createDeck()">+ New Deck</button>
                </div>
                <div class="deck-list" id="deckList"></div>
            </div>
        </div>
        
        <div id="study" class="tab-content">
            <div class="card">
                <div id="studyArea"></div>
            </div>
        </div>
        
        <div id="settings" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #374151;">Settings</h2>
                
                <div class="settings-form">
                    <div class="form-group">
                        <label>Daily Goal</label>
                        <input type="number" id="dailyGoal" value="20" min="1" max="100">
                    </div>
                    
                    <div class="form-group">
                        <label>Cards per Session</label>
                        <input type="number" id="cardsPerSession" value="10" min="1" max="50">
                    </div>
                    
                    <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
                    
                    <hr style="margin: 20px 0; border: none; border-top: 1px solid #e5e7eb;">
                    
                    <div class="form-group">
                        <label>Data Management</label>
                        <div class="button-group" style="justify-content: flex-start;">
                            <button class="btn-secondary" onclick="exportData()">Export Data</button>
                            <button class="btn-secondary" onclick="importData()">Import Data</button>
                            <button class="btn-danger" onclick="resetData()">Reset All Data</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let appData = {
            decks: [],
            stats: {
                totalStudied: 0,
                currentStreak: 0,
                lastStudyDate: null
            },
            settings: {
                dailyGoal: 20,
                cardsPerSession: 10
            },
            badges: [
                { id: 'first_card', name: 'First Step', icon: '🎯', unlocked: false, requirement: 1 },
                { id: 'ten_cards', name: '10 Cards', icon: '🔟', unlocked: false, requirement: 10 },
                { id: 'fifty_cards', name: 'Half Century', icon: '🎖️', unlocked: false, requirement: 50 },
                { id: 'hundred_cards', name: 'Centurion', icon: '💯', unlocked: false, requirement: 100 },
                { id: 'week_streak', name: '7 Day Streak', icon: '🔥', unlocked: false, requirement: 7 },
                { id: 'first_deck', name: 'Deck Builder', icon: '🏗️', unlocked: false, requirement: 1 }
            ]
        };
        
        let currentDeck = null;
        let currentCardIndex = 0;
        let sessionCards = [];
        
        function init() {
            loadData();
            renderDashboard();
            renderDecks();
            renderBadges();
            loadSettings();
            
            if (appData.decks.length === 0) {
                createSampleDeck();
            }
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'dashboard') renderDashboard();
            else if (tabName === 'decks') renderDecks();
            else if (tabName === 'study') renderStudyArea();
        }
        
        function renderDashboard() {
            document.getElementById('totalStudied').textContent = appData.stats.totalStudied;
            document.getElementById('currentStreak').textContent = appData.stats.currentStreak;
            
            const masteryRate = calculateMasteryRate();
            document.getElementById('masteryRate').textContent = masteryRate + '%';
            
            renderBadges();
        }
        
        function calculateMasteryRate() {
            if (appData.decks.length === 0) return 0;
            
            let totalCards = 0;
            let masteredCards = 0;
            
            appData.decks.forEach(deck => {
                totalCards += deck.cards.length;
                masteredCards += deck.cards.filter(card => card.masteryLevel >= 4).length;
            });
            
            return totalCards > 0 ? Math.round((masteredCards / totalCards) * 100) : 0;
        }
        
        function renderBadges() {
            const grid = document.getElementById('badgesGrid');
            grid.innerHTML = '';
            
            appData.badges.forEach(badge => {
                const badgeEl = document.createElement('div');
                badgeEl.className = 'badge' + (badge.unlocked ? ' unlocked' : '');
                badgeEl.innerHTML = `
                    <div class="badge-icon">${badge.icon}</div>
                    <div class="badge-name">${badge.name}</div>
                `;
                grid.appendChild(badgeEl);
            });
        }
        
        function checkBadges() {
            let newBadges = false;
            
            if (!appData.badges[0].unlocked && appData.stats.totalStudied >= 1) {
                appData.badges[0].unlocked = true;
                newBadges = true;
            }
            if (!appData.badges[1].unlocked && appData.stats.totalStudied >= 10) {
                appData.badges[1].unlocked = true;
                newBadges = true;
            }
            if (!appData.badges[2].unlocked && appData.stats.totalStudied >= 50) {
                appData.badges[2].unlocked = true;
                newBadges = true;
            }
            if (!appData.badges[3].unlocked && appData.stats.totalStudied >= 100) {
                appData.badges[3].unlocked = true;
                newBadges = true;
            }
            if (!appData.badges[4].unlocked && appData.stats.currentStreak >= 7) {
                appData.badges[4].unlocked = true;
                newBadges = true;
            }
            if (!appData.badges[5].unlocked && appData.decks.length >= 1) {
                appData.badges[5].unlocked = true;
                newBadges = true;
            }
            
            if (newBadges) {
                saveData();
                renderBadges();
            }
        }
        
        function renderDecks() {
            const list = document.getElementById('deckList');
            
            if (appData.decks.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <h3>No decks yet</h3>
                        <p>Create your first deck to start learning!</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = '';
            appData.decks.forEach((deck, index) => {
                const progress = calculateDeckProgress(deck);
                const deckEl = document.createElement('div');
                deckEl.className = 'deck-item';
                deckEl.innerHTML = `
                    <div class="deck-info">
                        <h3>${deck.name}</h3>
                        <div class="deck-stats">
                            ${deck.cards.length} cards • ${progress}% mastered
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn-primary" onclick="startStudy(${index})">Study</button>
                        <button class="btn-secondary" onclick="editDeck(${index})">Edit</button>
                        <button class="btn-danger" onclick="deleteDeck(${index})">Delete</button>
                    </div>
                `;
                list.appendChild(deckEl);
            });
        }
        
        function calculateDeckProgress(deck) {
            if (deck.cards.length === 0) return 0;
            const masteredCards = deck.cards.filter(card => card.masteryLevel >= 4).length;
            return Math.round((masteredCards / deck.cards.length) * 100);
        }
        
        function createDeck() {
            const name = prompt('Enter deck name:');
            if (!name) return;
            
            const newDeck = {
                id: Date.now(),
                name: name,
                cards: [],
                createdAt: new Date().toISOString()
            };
            
            appData.decks.push(newDeck);
            saveData();
            renderDecks();
            checkBadges();
            
            if (confirm('Deck created! Would you like to add cards now?')) {
                editDeck(appData.decks.length - 1);
            }
        }
        
        function createSampleDeck() {
            const sampleDeck = {
                id: Date.now(),
                name: 'Spanish Basics',
                cards: [
                    { front: 'Hello', back: 'Hola', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'Goodbye', back: 'Adiós', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'Thank you', back: 'Gracias', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'Please', back: 'Por favor', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'Yes', back: 'Sí', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'No', back: 'No', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'Good morning', back: 'Buenos días', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'Good night', back: 'Buenas noches', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'How are you?', back: '¿Cómo estás?', masteryLevel: 0, nextReview: new Date().toISOString() },
                    { front: 'I am fine', back: 'Estoy bien', masteryLevel: 0, nextReview: new Date().toISOString() }
                ],
                createdAt: new Date().toISOString()
            };
            
            appData.decks.push(sampleDeck);
            saveData();
            renderDecks();
        }
        
        function editDeck(index) {
            const deck = appData.decks[index];
            const action = prompt(`Deck: ${deck.name}\n\n1. Add card\n2. Remove card\n3. Rename deck\n\nEnter choice (1-3):`);
            
            if (action === '1') {
                const front = prompt('Front of card:');
                if (!front) return;
                const back = prompt('Back of card:');
                if (!back) return;
                
                deck.cards.push({
                    front: front,
                    back: back,
                    masteryLevel: 0,
                    nextReview: new Date().toISOString()
                });
                
                saveData();
                renderDecks();
                alert('Card added!');
            } else if (action === '2') {
                const cardIndex = prompt(`Enter card number to remove (1-${deck.cards.length}):`);
                if (cardIndex && cardIndex > 0 && cardIndex <= deck.cards.length) {
                    deck.cards.splice(cardIndex - 1, 1);
                    saveData();
                    renderDecks();
                    alert('Card removed!');
                }
            } else if (action === '3') {
                const newName = prompt('Enter new deck name:', deck.name);
                if (newName) {
                    deck.name = newName;
                    saveData();
                    renderDecks();
                }
            }
        }
        
        function deleteDeck(index) {
            if (confirm('Are you sure you want to delete this deck?')) {
                appData.decks.splice(index, 1);
                saveData();
                renderDecks();
            }
        }
        
        function startStudy(deckIndex) {
            currentDeck = appData.decks[deckIndex];
            currentCardIndex = 0;
            
            sessionCards = currentDeck.cards
                .filter(card => new Date(card.nextReview) <= new Date())
                .slice(0, appData.settings.cardsPerSession);
            
            if (sessionCards.length === 0) {
                alert('No cards due for review! Come back later.');
                return;
            }
            
            switchTab('study');
            document.querySelector('[onclick="switchTab(\'study\')"]').click();
            renderStudyCard();
        }
        
        function renderStudyArea() {
            const area = document.getElementById('studyArea');
            
            if (!currentDeck || sessionCards.length === 0) {
                area.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <h3>Ready to study?</h3>
                        <p>Select a deck from the Decks tab to start learning!</p>
                    </div>
                `;
                return;
            }
            
            renderStudyCard();
        }
        
        function renderStudyCard() {
            const area = document.getElementById('studyArea');
            
            if (currentCardIndex >= sessionCards.length) {
                area.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎉</div>
                        <h2>Session Complete!</h2>
                        <p>You studied ${sessionCards.length} cards</p>
                        <button class="btn-primary" onclick="finishSession()">Finish</button>
                    </div>
                `;
                return;
            }
            
            const card = sessionCards[currentCardIndex];
            const progress = currentCardIndex + 1;
            const total = sessionCards.length;
            
            area.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: #6b7280;">Card ${progress} of ${total}</span>
                        <span style="color: #6b7280;">Deck: ${currentDeck.name}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${(progress/total)*100}%"></div>
                    </div>
                </div>
                
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="card-front">${card.front}</div>
                    <div class="card-back">${card.back}</div>
                </div>
                
                <div style="text-align: center; margin-bottom: 20px; color: #6b7280;">
                    <p>Click card to flip</p>
                </div>
                
                <div class="button-group">
                    <button class="btn-danger" onclick="rateCard(0)">❌ Again</button>
                    <button class="btn-warning" onclick="rateCard(1)">🤔 Hard</button>
                    <button class="btn-success" onclick="rateCard(2)">✅ Good</button>
                    <button class="btn-primary" onclick="rateCard(3)">🎯 Easy</button>
                </div>
            `;
        }
        
        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }
        
        function rateCard(rating) {
            const card = sessionCards[currentCardIndex];
            
            if (rating === 0) {
                card.masteryLevel = Math.max(0, card.masteryLevel - 1);
            } else if (rating === 1) {
                card.masteryLevel = Math.max(0, card.masteryLevel);
            } else if (rating === 2) {
                card.masteryLevel = Math.min(5, card.masteryLevel + 1);
            } else if (rating === 3) {
                card.masteryLevel = Math.min(5, card.masteryLevel + 2);
            }
            
            const intervals = [1, 3, 7, 14, 30, 60];
            const interval = intervals[Math.min(card.masteryLevel, intervals.length - 1)];
            const nextReview = new Date();
            nextReview.setDate(nextReview.getDate() + interval);
            card.nextReview = nextReview.toISOString();
            
            appData.stats.totalStudied++;
            updateStreak();
            
            saveData();
            checkBadges();
            currentCardIndex++;
            renderStudyCard();
        }
        
        function updateStreak() {
            const today = new Date().toDateString();
            const lastStudy = appData.stats.lastStudyDate ? new Date(appData.stats.lastStudyDate).toDateString() : null;
            
            if (lastStudy === today) return;
            
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();
            
            if (lastStudy === yesterdayStr) {
                appData.stats.currentStreak++;
            } else if (lastStudy !== today) {
                appData.stats.currentStreak = 1;
            }
            
            appData.stats.lastStudyDate = new Date().toISOString();
        }
        
        function finishSession() {
            currentDeck = null;
            currentCardIndex = 0;
            sessionCards = [];
            renderDashboard();
            document.querySelector('[onclick="switchTab(\'dashboard\')"]').click();
        }
        
        function loadSettings() {
            document.getElementById('dailyGoal').value = appData.settings.dailyGoal;
            document.getElementById('cardsPerSession').value = appData.settings.cardsPerSession;
        }
        
        function saveSettings() {
            appData.settings.dailyGoal = parseInt(document.getElementById('dailyGoal').value);
            appData.settings.cardsPerSession = parseInt(document.getElementById('cardsPerSession').value);
            
            saveData();
            alert('Settings saved!');
        }
        
        function saveData() {
            localStorage.setItem('polycards_data', JSON.stringify(appData));
        }
        
        function loadData() {
            const saved = localStorage.getItem('polycards_data');
            if (saved) {
                appData = JSON.parse(saved);
            }
        }
        
        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'polycards_backup.json';
            link.click();
            alert('Data exported successfully!');
        }
        
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        appData = JSON.parse(event.target.result);
                        saveData();
                        init();
                        alert('Data imported successfully!');
                    } catch (error) {
                        alert('Error importing data. Please check the file.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function resetData() {
            if (confirm('Are you sure? This will delete ALL your data!')) {
                if (confirm('Really sure? This cannot be undone!')) {
                    localStorage.removeItem('polycards_data');
                    location.reload();
                }
            }
        }
        
        init();
    </script>
</body>
</html>
